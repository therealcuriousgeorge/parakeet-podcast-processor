feeds:
  - name: "Sharp Tech"
    url: "https://sharptech.fm/feed/podcast/G39iN2LZfgga9bEq6ZCji5"
    category: "tech"

# Global settings
settings:
  audio_format: "wav"
  max_episodes_per_feed: 1
  # Delete audio file from data/audio/ after successful transcription
  # (~115 MB per hour of audio at 16kHz mono WAV)
  cleanup_old_files: true
  
  # Transcription
  transcription_provider: "local-whisper"  # local-parakeet, local-whisper, openai-api
  whisper_model: "base"  # tiny, base, small, medium, large
  parakeet_enabled: false  # Use Parakeet MLX on Apple Silicon
  parakeet_model: "mlx-community/parakeet-tdt-0.6b-v2"
  
  # LLM cleaning
  llm_provider: "ollama"  # openai, anthropic, ollama
  llm_model: "gemma3:12b"  # For Ollama: llama3.2, gemma3:12b, etc.
  ollama_base_url: "http://localhost:11434"
  
  # Output
  export_format: ["markdown", "json"]
  email_enabled: false
